<script type="module">
const firebaseConfig = {
  apiKey: "AIzaSyCgKKrHIaDNzjUIaK2Z-Usf587px-lPMSY",
  authDomain: "pixelwordhunter.firebaseapp.com",
  projectId: "pixelwordhunter",
  storageBucket: "pixelwordhunter.firebasestorage.app",
  messagingSenderId: "1094897769595",
  appId: "1:1094897769595:web:392a30ef42f3b558b896de",
  measurementId: "G-X90YSQL16F"
};

import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
import { getFirestore, doc, setDoc, getDoc, updateDoc ,deleteDoc,writeBatch} from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
//const db = getFirestore(app);
window.firebaseAuth = auth;
window.firebaseDb = db;
  
let isRegisterMode = false;

// 🔥 ВСЕ ФУНКЦИИ FIREBASE
window.showAuthModal = (mode) => {
  isRegisterMode = mode === 'register';
  document.getElementById('auth-title').textContent = isRegisterMode ? '// REGISTER //' : '// LOGIN //';
  document.getElementById('username-field').style.display = isRegisterMode ? 'flex' : 'none';
  document.getElementById('auth-modal').classList.remove('hidden');
  document.getElementById('auth-error').textContent = '';
};

window.toggleAuthMode = () => {
  isRegisterMode = !isRegisterMode;
  document.getElementById('auth-title').textContent = isRegisterMode ? '// REGISTER //' : '// LOGIN //';
  document.getElementById('username-field').style.display = isRegisterMode ? 'flex' : 'none';
  document.getElementById('auth-toggle-text').textContent = isRegisterMode ? 'Have account?' : 'Need an account?';
  document.querySelector('.auth-toggle-btn').textContent = isRegisterMode ? 'LOGIN' : 'REGISTER';
};

window.closeAuthModal = () => {
  document.getElementById('auth-modal').classList.add('hidden');
  document.getElementById('auth-error').textContent = '';
};

window.handleAuthSubmit = async () => {
  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  const username = document.getElementById('auth-username').value.trim();
  const errorEl = document.getElementById('auth-error');
  
  if (!email || !password) {
    errorEl.textContent = 'Email and password required';
    return;
  }

  errorEl.textContent = 'Loading...';

  try {
    let userCredential;
    
    if (isRegisterMode) {
      if (!username) throw new Error('Enter username');
      userCredential = await createUserWithEmailAndPassword(auth, email, password);
      
      await setDoc(doc(db, "users", userCredential.user.uid), {
        username,
        email,
        xp: 0,
        level: 1,
        category: "Beginner",
        mastered: 0,
        total: 600,
        createdAt: new Date().toISOString()
      });
    } else {
      userCredential = await signInWithEmailAndPassword(auth, email, password);
    }
    
    closeAuthModal();
    showWelcomeNotification(userCredential.user);
    
  } catch (error) {
    errorEl.textContent = error.message.includes('auth/user-not-found') ? 'User not found' : 
                         error.message.includes('auth/wrong-password') ? 'Wrong password' :
                         error.message.includes('auth/email-already') ? 'Email already exists' :
                         error.message;
  }
};

window.logout = async () => {
  await signOut(auth);
  document.getElementById('hunt-btn').classList.add('hidden');
  document.getElementById('auth-buttons').classList.remove('hidden');
  document.getElementById('mastered-count').textContent = '0';
  document.getElementById('total-count').textContent = '600';
};

// Delete Account Modal
window.showDeleteAccountModal = () => {
  document.getElementById('delete-modal').classList.remove('hidden');
  document.getElementById('delete-password').value = '';
  document.getElementById('delete-error').textContent = '';
};
window.closeDeleteModal = () => {
  document.getElementById('delete-modal').classList.add('hidden');
};
// Delete Account handler
document.getElementById('delete-confirm-btn')?.addEventListener('click', async () => {
  const password = document.getElementById('delete-password').value;
  const errorEl = document.getElementById('delete-error');
  const deleteBtn = document.getElementById('delete-confirm-btn');
  const user = auth.currentUser;
  
  if (!user) { errorEl.textContent = 'Not logged in'; return; }
  if (!password) { errorEl.textContent = 'Enter password'; return; }
  // Loading state
  deleteBtn.disabled = true;
  deleteBtn.textContent = 'DELETING...';
  
try {
    // Re-authenticate
    await signInWithEmailAndPassword(auth, user.email, password);
    
    // Batch delete - атомарная операция
    const batch = writeBatch(db);
    batch.delete(doc(db, "users", user.uid));
    await batch.commit();
    
    // Delete Auth account
    await user.delete();
    
    alert('Account deleted!');
    window.location.reload();
  } catch (error) {
    // console.error('Delete error:', error);
    errorEl.textContent = error.message.includes('wrong-password') ? 'Wrong password' : error.message;
    deleteBtn.disabled = false;
    deleteBtn.textContent = 'DELETE';
  }
});
  
function showWelcomeNotification(user) {
  const notif = document.getElementById('ios-notification');
const displayName = user.displayName || user.email.split('@')[0];
  document.getElementById('notification-text').textContent = `Welcome, ${displayName}!`;
  notif.classList.remove('hidden');
  notif.classList.add('show');
  setTimeout(() => {
    notif.classList.remove('show');
    setTimeout(() => notif.classList.add('hidden'), 400);
  }, 3000);
}

async function loadUserProgress(user) {
  try {
    const userDoc = await getDoc(doc(db, "users", user.uid));
    if (userDoc.exists()) {
      const data = userDoc.data();
      document.getElementById('mastered-count').textContent = data.mastered || 0;
      document.getElementById('total-count').textContent = data.total || 600;
      const xpEl = document.getElementById('xp');
      if (xpEl) xpEl.textContent = data.xp || 0;
    }
  } catch (e) {
    //console.error('Load progress error:', e);
  }
}

// ✅ КРИТИЧЕСКИ ВАЖНО: ВСЁ в DOMContentLoaded
document.addEventListener('DOMContentLoaded', () => {
  // Firebase автологин
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      document.getElementById('hunt-btn').classList.remove('hidden');
      document.getElementById('auth-buttons').classList.add('hidden');
      await loadUserProgress(user);
      // Добавляем кнопку logout в user-info
      let userInfo = document.querySelector('.user-info');
      if (!userInfo) {
        userInfo = document.createElement('div');
        userInfo.className = 'user-info';
        document.querySelector('.game-title').parentNode.appendChild(userInfo);
      }
      userInfo.innerHTML = `👤 ${user.email.split('@')[0]} <button onclick="logout()">LOGOUT</button>`;
    } else {
      document.getElementById('hunt-btn').classList.add('hidden');
      document.getElementById('auth-buttons').classList.remove('hidden');
      const userInfo = document.querySelector('.user-info');
      if (userInfo) userInfo.remove();
    }
  });
  // Обработчики событий
  document.getElementById('auth-submit-btn')?.addEventListener('click', handleAuthSubmit);
  document.querySelector('.auth-toggle-btn')?.addEventListener('click', toggleAuthMode);
  document.querySelector('.auth-close')?.addEventListener('click', closeAuthModal);
});
</script>
